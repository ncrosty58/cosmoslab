name: Validate Node-RED flow

on:
  push:
    paths:
      - "flows/**.json"
      - "scripts/validate_flow.py"
  pull_request:
    paths:
      - "flows/**.json"
      - "scripts/validate_flow.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate flow JSON
        run: |
          for f in flows/*.json; do
            python3 scripts/validate_flow.py "$f"
          done
